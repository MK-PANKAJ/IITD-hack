# CloudGreen OS — Neo4j CE StatefulSet
# Community Edition 5.x, single replica for supply chain graph.
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: data-system
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/part-of: cloudgreen-os
    app.kubernetes.io/component: graph-database
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
        app.kubernetes.io/part-of: cloudgreen-os
        app.kubernetes.io/component: graph-database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 7474
        runAsGroup: 7474
        fsGroup: 7474
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: neo4j
          image: neo4j:5-community
          ports:
            - name: http
              containerPort: 7474
              protocol: TCP
            - name: bolt
              containerPort: 7687
              protocol: TCP
          envFrom:
            - secretRef:
                name: neo4j-credentials
          env:
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: "yes"
            # Apply conf from mounted ConfigMap
            - name: NEO4J_server_config_strict__validation_enabled
              value: "false"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 768Mi
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
            - name: neo4j-config
              mountPath: /var/lib/neo4j/conf/neo4j.conf
              subPath: neo4j.conf
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: neo4j-config
          configMap:
            name: neo4j-config
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
        labels:
          app.kubernetes.io/name: neo4j
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
