apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: data-system
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: cloudgreen-os
    app.kubernetes.io/component: database
type: Opaque
data:
  # cloudgreen_admin
  POSTGRES_USER: Y2xvdWRncmVlbl9hZG1pbg==
  # cg-poly-s3cur3-2026!
  POSTGRES_PASSWORD: Y2ctcG9seS1zM2N1cjMtMjAyNiE=
  # cloudgreen
  POSTGRES_DB: Y2xvdWRncmVlbg==
  # keycloak
  KEYCLOAK_DB: a2V5Y2xvYWs=
