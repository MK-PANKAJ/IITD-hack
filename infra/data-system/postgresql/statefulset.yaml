# CloudGreen OS — PostgreSQL StatefulSet
# Single-replica PostgreSQL 16 for dev/staging.
# Data persisted via PVC. Init schema loaded from ConfigMap.
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: data-system
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: cloudgreen-os
    app.kubernetes.io/component: database
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/part-of: cloudgreen-os
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - name: pg
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: postgresql-credentials
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: pg-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
              readOnly: true
            - name: pg-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          args:
            - -c
            - config_file=/etc/postgresql/postgresql.conf
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: pg-config
          configMap:
            name: postgresql-config
        - name: pg-init
          configMap:
            name: postgresql-init-schema
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: pg-data
        labels:
          app.kubernetes.io/name: postgresql
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
