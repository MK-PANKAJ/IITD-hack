# CloudGreen OS — PostgreSQL Service
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: data-system
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: cloudgreen-os
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgresql
