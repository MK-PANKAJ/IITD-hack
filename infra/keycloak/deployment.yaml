# CloudGreen OS — Keycloak Deployment
# Keycloak 25 with PostgreSQL backend (shared instance in data-system).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: auth-system
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: cloudgreen-os
    app.kubernetes.io/component: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/part-of: cloudgreen-os
        app.kubernetes.io/component: identity
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:25.0
          args:
            - start-dev
            - --import-realm
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # --- Admin credentials ---
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: KC_ADMIN
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: KC_ADMIN_PASSWORD
            # --- Database (shared PostgreSQL) ---
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://postgresql.data-system.svc.cluster.local:5432/keycloak"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: KC_DB_USERNAME
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: KC_DB_PASSWORD
            # --- JVM tuning for memory constraints ---
            - name: JAVA_OPTS_KC_HEAP
              value: "-Xms128m -Xmx384m"
            # --- Health & metrics ---
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            # --- Hostname (dev mode) ---
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
