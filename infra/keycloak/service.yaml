# CloudGreen OS — Keycloak Service
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: auth-system
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: cloudgreen-os
    app.kubernetes.io/component: identity
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: keycloak
