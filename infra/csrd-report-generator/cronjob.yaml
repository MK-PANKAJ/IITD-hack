# =============================================================================
# CloudGreen OS — CSRD Report Generator CronJob
# Runs the report generator on a schedule (default: monthly).
#
# Apply:  kubectl apply -f infra/csrd-report-generator/
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: csrd-report-generator
  namespace: cloudgreen
  labels:
    app.kubernetes.io/name: csrd-report-generator
    app.kubernetes.io/component: compliance
    app.kubernetes.io/part-of: cloudgreen-os
spec:
  # Run at 02:00 UTC on the 1st of every month
  schedule: "0 2 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600   # 10 min timeout
      template:
        metadata:
          labels:
            app.kubernetes.io/name: csrd-report-generator
        spec:
          restartPolicy: OnFailure
          containers:
            - name: csrd-generator
              image: cloudgreen/csrd-report-generator:latest
              imagePullPolicy: IfNotPresent
              args:
                - "--org"
                - "CloudGreen Industries"
                - "--year"
                - "2026"
                - "--output"
                - "/app/reports"
              env:
                - name: PGHOST
                  value: "postgresql.data-system.svc.cluster.local"
                - name: PGPORT
                  value: "5432"
                - name: PGDATABASE
                  value: "cloudgreen"
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: password
              volumeMounts:
                - name: reports-volume
                  mountPath: /app/reports
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: reports-volume
              persistentVolumeClaim:
                claimName: csrd-reports-pvc
---
# PVC for persisting generated PDF reports
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: csrd-reports-pvc
  namespace: cloudgreen
  labels:
    app.kubernetes.io/name: csrd-report-generator
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
