# =============================================================================
# CloudGreen OS — Ollama Model Storage PVC
# Persists downloaded LLM models across pod restarts.
# Llama 3.1 8B (Q4_0) ≈ 4.7 GB on disk.
#
# Apply: kubectl apply -f infra/ollama/pvc.yaml
# =============================================================================
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ai-system
  labels:
    app: ollama
    app.kubernetes.io/part-of: cloudgreen-os
    app.kubernetes.io/component: ai-inference
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path    # k3s default StorageClass
  resources:
    requests:
      storage: 20Gi              # Room for Llama 3.1 8B + future models
