# CloudGreen OS — ENTSO-E API Token Secret
# Populate before applying:
#   kubectl create secret generic entso-e-credentials \
#     --namespace=kafka-system \
#     --from-literal=ENTSOE_API_TOKEN=<your-token> \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or inject from OpenBao:
#   bao kv put cloudgreen/entso-e api_token=<your-token>
---
apiVersion: v1
kind: Secret
metadata:
  name: entso-e-credentials
  namespace: kafka-system
  labels:
    app.kubernetes.io/part-of: cloudgreen-os
    app.kubernetes.io/component: carbon-pipeline
type: Opaque
stringData:
  # Replace with your actual ENTSO-E Transparency Platform security token
  # Register at: https://transparency.entsoe.eu/ → My Account → Web API Security Token
  ENTSOE_API_TOKEN: "REPLACE_WITH_YOUR_ENTSOE_API_TOKEN"
