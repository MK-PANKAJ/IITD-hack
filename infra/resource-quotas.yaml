# CloudGreen OS — Resource Quotas
# Prevents any single namespace from consuming all node memory.
# Tuned for 8 GB RAM per node.
# Apply: kubectl apply -f infra/resource-quotas.yaml
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: kafka-quota
  namespace: kafka-system
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 3Gi
    pods: "10"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: registry-quota
  namespace: registry-system
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 512Mi
    limits.cpu: "1"
    limits.memory: 1Gi
    pods: "5"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: vault-quota
  namespace: vault-system
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 256Mi
    limits.cpu: "1"
    limits.memory: 512Mi
    pods: "5"
---
# Polyglot storage (PostgreSQL + Neo4j)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: data-quota
  namespace: data-system
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 1536Mi
    pods: "5"
---
# Identity (Keycloak)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: auth-quota
  namespace: auth-system
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 256Mi
    limits.cpu: "1"
    limits.memory: 512Mi
    pods: "3"
---
# AI/LLM Inference (Ollama + Llama 3.1)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ai-quota
  namespace: ai-system
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 5Gi
    limits.cpu: "6"
    limits.memory: 7Gi
    pods: "5"
    persistentvolumeclaims: "3"
