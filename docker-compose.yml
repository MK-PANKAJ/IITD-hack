# ============================================================
# CloudGreen OS — Unified Production Infrastructure (Local)
# ============================================================
# Components:
#   - Kafka (KRaft mode): Telemetry ingestion (localhost:9092)
#   - PostgreSQL 16: Relational metadata (localhost:5432)
#   - Neo4j 5.x: Supply chain graph (localhost:7474, 7687)
#   - Keycloak 25: Identity management (localhost:8180)
#
# To Run:
#   docker compose up -d
# ============================================================

services:
  # ----- Kafka (KRaft Mode) -----
  kafka:
    image: public.ecr.aws/bitnami/kafka:3.7.0
    container_name: cg-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----- PostgreSQL 16 -----
  postgresql:
    image: postgres:16-alpine
    container_name: cg-postgresql
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cloudgreen_admin
      POSTGRES_PASSWORD: cg-poly-s3cur3-2026!
      POSTGRES_DB: cloudgreen
    volumes:
      - pg_infra_data:/var/lib/postgresql/data
      - ./infra/data-system/postgresql/init-schema.sql:/docker-entrypoint-initdb.d/01-init-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudgreen_admin -d cloudgreen"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----- Neo4j 5.x -----
  neo4j:
    image: neo4j:5-community
    container_name: cg-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt driver
    environment:
      NEO4J_AUTH: neo4j/cg-graph-s3cur3-2026!
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_infra_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ----- Keycloak 25 -----
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: cg-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: cg-kc-adm1n-2026!
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgresql:5432/cloudgreen
      KC_DB_USERNAME: cloudgreen_admin
      KC_DB_PASSWORD: cg-poly-s3cur3-2026!
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-export:/opt/keycloak/data/import:ro
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  pg_infra_data:
    driver: local
  neo4j_infra_data:
    driver: local
